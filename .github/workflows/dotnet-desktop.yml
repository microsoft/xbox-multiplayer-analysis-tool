name: XMAT Win64 Desktop Build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:

  build:

    strategy:
      matrix:
        configuration: [Debug, Release]

    runs-on: windows-latest  # For a list of available runner types, refer to
                             # https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on

    env:
      Solution_Name: XboxMultiplayerAnalysisTool.sln

    steps:
    - name: Harden Runner
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0

    # Install the .NET Core workload
    - name: Install .NET Core
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
      with:
        dotnet-version: 10.0.x

    # Restore the solution
    - name: Restore the application
      run: dotnet restore $env:Solution_Name
      
    # Build
    - name: Build XMAT
      run: dotnet build $env:Solution_Name -c $env:Configuration --no-restore
      env:
        Configuration: ${{ matrix.configuration }}

    # Run tests with code coverage
    - name: Run Tests with Coverage
      run: >-
        dotnet test $env:Solution_Name
        -c $env:Configuration
        --no-build
        --verbosity normal
        --logger "trx;LogFileName=test-results.trx"
        --collect:"XPlat Code Coverage"
        --results-directory ./TestResults
      env:
        Configuration: ${{ matrix.configuration }}

    # Generate coverage report
    - name: Install ReportGenerator
      run: dotnet tool install --global dotnet-reportgenerator-globaltool

    - name: Generate Coverage Report
      run: >-
        reportgenerator
        "-reports:TestResults/**/coverage.cobertura.xml"
        "-targetdir:TestResults/CoverageReport"
        "-reporttypes:HtmlInline_AzurePipelines;Cobertura;MarkdownSummaryGithub"
      
    - name: Post Coverage Summary
      if: always()
      run: |
        if (Test-Path "TestResults/CoverageReport/SummaryGithub.md") {
          Get-Content "TestResults/CoverageReport/SummaryGithub.md" >> $env:GITHUB_STEP_SUMMARY
        }

    - name: Upload Coverage Report
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: CoverageReport_${{ matrix.configuration }}
        path: TestResults/CoverageReport/

    # Upload build artifact
    - name: Upload Artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: XMAT_CI_Build_${{ env.Configuration }}
        path: XMAT\bin\x64\${{ env.Configuration }}\net10.0-windows10.0.17763.0\win-x64\
      env:
        Configuration: ${{ matrix.configuration }}
